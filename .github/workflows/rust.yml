name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        link: [static-link, dynamic-link]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake llvm

      - name: Build
        run: cargo build --verbose --features ${{ matrix.link }} --no-default-features

      - name: Run tests
        run: cargo test --verbose --features ${{ matrix.link }} --no-default-features
